# _data/theme.yml
#
# THIS is the file to edit when you want to change how the whole site
# looks: colors, fonts, spacing scale, corner radius, and button styles.
#
# Nothing here is hardcoded into layouts or CSS files — assets/css/main.scss
# reads this file and generates CSS custom properties (e.g. --color-primary)
# in :root. Every Sass partial in _sass/ then uses those variables, so a
# change here updates the entire site after one rebuild. No need to touch
# any .scss file for a simple color/font/spacing tweak.
#
# Keys become CSS variable names, so keep them lowercase with hyphens
# (no spaces, no underscores) — e.g. `primary-dark` becomes `--color-primary-dark`.
#
# Values below follow the brand's design system: minimal, premium, clinical,
# calm, boutique — white backgrounds throughout, black text, blue used
# sparingly (buttons/links only, never big blue bands).

colors:
  primary: "#153E75"       # Deep-navy accent/CTA color — use sparingly (buttons, links, active states)
  primary-dark: "#0F2C56"  # Hover/focus state for the primary color
  text: "#111111"
  text-muted: "#5B6472"
  background: "#FFFFFF"
  background-alt: "#F7F7F7" # Secondary — light gray section backgrounds
  border: "#EAEAEA"         # Border gray — used instead of shadows wherever possible
  white: "#FFFFFF"
  overlay: "rgba(17, 17, 17, 0.45)"

fonts:
  heading: "'Role Model', 'Playfair Display', serif"
  body: "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
  base-size: "16px"
  line-height: "1.6"

# Spacing scale used for margins, padding, and gaps throughout the site.
# md ~ card internal padding (24-32px), lg ~ spacing inside a section
# (32-48px), xl ~ padding above/below each section (adjacent sections end
# up ~100-140px apart), xxl ~ hero top padding.
spacing:
  xs: "0.5rem"
  sm: "1rem"
  md: "1.75rem"
  lg: "2.5rem"
  xl: "4rem"
  xxl: "6rem"

radius:
  sm: "10px"   # buttons, inputs
  md: "16px"   # cards, images
  lg: "16px"
  pill: "999px"

# Button variants. Each one becomes a `.btn--<name>` class (see
# _sass/_buttons.scss) usable via {% include button.html style="primary" %}.
# Values can reference other tokens above with var(--color-...).
buttons:
  primary:
    bg: "var(--color-primary)"
    text: "var(--color-white)"
    hover-bg: "var(--color-primary-dark)"
    border: "transparent"
  secondary:
    bg: "var(--color-white)"
    text: "var(--color-text)"
    hover-bg: "var(--color-background-alt)"
    border: "var(--color-text)"
  outline-light:
    bg: "transparent"
    text: "var(--color-white)"
    hover-bg: "rgba(255, 255, 255, 0.15)"
    border: "var(--color-white)"
