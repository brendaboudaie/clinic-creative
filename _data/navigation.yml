# _data/navigation.yml
#
# Mega-menu structure. Each top-level item is ALWAYS its own destination —
# clicking the label navigates to `url` — and, if it has a `children` list,
# hovering (desktop) or tapping (mobile, expands inline) also reveals a
# dropdown of direct links to sub-pages. _includes/navigation.html loops
# over this, so add/remove/reorder entries here without touching HTML.
#
# Only specialties with a real page are listed here (Phase 1). Once a
# Phase 2 specialty gets its own file, add it here and it appears in the
# dropdown automatically.

- title: Home
  url: /

- title: What We Do
  url: /services/
  children:
    - title: Website Design
      url: /services/website-design/
    - title: Logo & Branding
      url: /services/logo-branding/
    - title: SEO
      url: /services/seo/
    - title: Website Maintenance
      url: /services/website-maintenance/

- title: For Dental
  url: /dental/
  children:
    - title: General Dentistry
      url: /dental/general-dentistry/
    - title: Orthodontic
      url: /dental/orthodontic/
    - title: Cosmetic Dentistry
      url: /dental/cosmetic-dentistry/

- title: For Medical
  url: /medical/
  children:
    - title: Family Medicine
      url: /medical/family-medicine/
    - title: Dermatology
      url: /medical/dermatology/
    - title: Med Spa
      url: /medical/med-spa/

- title: About
  url: /about/

- title: Contact
  url: /contact/
