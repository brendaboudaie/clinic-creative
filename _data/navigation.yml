# _data/navigation.yml
#
# Mega-menu structure. Each top-level item is ALWAYS its own destination —
# clicking the label navigates to `url` — and, if it has a `children` list,
# hovering (desktop) or tapping (mobile, expands inline) also reveals a
# dropdown of direct links to sub-pages. _includes/navigation.html loops
# over this, so add/remove/reorder entries here without touching HTML.
#
# Only specialties with a real page are listed here. Add a new specialty
# to _data/dental_specialties.yml or _data/medical_specialties.yml, give
# it a page, then add it here to appear in the dropdown.

