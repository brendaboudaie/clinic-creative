# _config.yml
#
# Site-wide settings. Jekyll only reads this file on server START, not on
# save — restart `bundle exec jekyll serve` after editing it.
#
# Anything defined here is available in templates as `site.whatever`,
# e.g. `title:` below becomes `{{ site.title }}`.

title: "Clinic Creative"
tagline: "Websites and Branding for Medical and Dental Offices in Los Angeles" # TBD per brief — refine once finalized
description: "Clinic Creative builds websites, branding, and SEO exclusively for medical and dental practices in Los Angeles."
url: "https://thecliniccreative.com" # custom domain — see CNAME file. Update if the domain changes.
baseurl: "" # not needed for a custom-domain site

# Shown in the footer/header and used as contact fallbacks. Placeholders —
# replace with real business details before launch.
email: "hello@thecliniccreative.com" # PLACEHOLDER
phone: "(310) 000-0000" # PLACEHOLDER
address: "Los Angeles, CA" # PLACEHOLDER — add a full address if one should be public

# ---------------------------------------------------------------------------
# Build settings
# ---------------------------------------------------------------------------
markdown: kramdown
permalink: pretty
sass:
  style: compressed

# The github-pages gem defaults every site to "jekyll-theme-primer" unless
# explicitly overridden — this site has its own complete design system
# (_layouts/, _includes/, _sass/), so disable that default explicitly.
theme: null

# Plugins must come from GitHub Pages' supported list:
# https://pages.github.com/versions/
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# ---------------------------------------------------------------------------
# Front-matter defaults
# ---------------------------------------------------------------------------
# These set a default `layout` (and, for the specialty verticals, a default
# `vertical` value) per folder, so individual pages don't repeat it. Any
# page can still override by setting its own front matter.
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: "services"
    values:
      layout: "service"
  - scope:
      path: "services/index.md"
    values:
      layout: "vertical-landing"
      section: "services"
  - scope:
      path: "dental"
    values:
      layout: "specialty-vertical"
      vertical: "dental"
  - scope:
      path: "dental/index.md"
    values:
      layout: "vertical-landing"
      section: "dental"
  - scope:
      path: "medical"
    values:
      layout: "specialty-vertical"
      vertical: "medical"
  - scope:
      path: "medical/index.md"
    values:
      layout: "vertical-landing"
      section: "medical"

# ---------------------------------------------------------------------------
# Files/folders Jekyll should not copy into the built site
# ---------------------------------------------------------------------------
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
  - "*.gemspec"
